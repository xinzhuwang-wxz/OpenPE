# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "digital_economy_labor_structure"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"
tectonic = ">=0.15.0,<0.16"

# --- Core stack (always needed) ---
[pypi-dependencies]
numpy = ">=1.24"
scipy = ">=1.11"
pandas = ">=2.0"
matplotlib = ">=3.8"
statsmodels = ">=0.14"
rich = ">=13.0"
pyarrow = ">=14.0"
pyyaml = ">=6.0"

# --- Data acquisition ---
requests = ">=2.31"
wbgapi = ">=1.0"         # World Bank API
fredapi = ">=0.5"        # FRED API
openpyxl = ">=3.1"       # Excel reading

# --- Causal inference ---
dowhy = ">=0.11"
causal-learn = ">=0.1"   # PC algorithm for causal structure discovery
pdfplumber = ">=0.10"    # PDF table extraction

# --- Uncomment as needed ---
# scikit-learn = ">=1.3"
# xgboost = ">=2.0"

[tasks]
py = "python"
build-pdf = "cd phase6_documentation/exec && pandoc REPORT.md -o REPORT.pdf --pdf-engine=tectonic --number-sections --toc --filter pandoc-crossref --citeproc"
# --- Analysis tasks ---
acquire = "python phase0_discovery/scripts/acquire_data.py"
verify-data = "python phase0_discovery/scripts/verify_data.py"
acquire-nbs = "python phase0_discovery/scripts/acquire_nbs_provincial.py"
# analyze = "python phase3_analysis/scripts/run_analysis.py"
project = "python phase4_projection/scripts/projection_simulation.py"
# verify  = "python phase5_verification/scripts/verify_all.py"
# all = { depends-on = ["acquire", "analyze", "project", "verify", "build-pdf"] }
explore-profile = "python phase2_exploration/scripts/01_data_profiling.py"
explore-stationarity = "python phase2_exploration/scripts/02_stationarity_tests.py"
explore-plots = "python phase2_exploration/scripts/03_time_series_plots.py"
explore-breaks = "python phase2_exploration/scripts/04_structural_breaks.py"
explore-power = "python phase2_exploration/scripts/05_power_ilo_endogeneity.py"
explore = "python phase2_exploration/scripts/01_data_profiling.py && python phase2_exploration/scripts/02_stationarity_tests.py && python phase2_exploration/scripts/03_time_series_plots.py && python phase2_exploration/scripts/04_structural_breaks.py && python phase2_exploration/scripts/05_power_ilo_endogeneity.py"
generate-audit = "python phase6_documentation/scripts/generate_audit.py"
