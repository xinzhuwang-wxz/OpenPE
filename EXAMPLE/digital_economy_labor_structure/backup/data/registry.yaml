datasets:
- name: worldbank_china_indicators
  source_url: https://data.worldbank.org/
  source_authority: World Bank (World Development Indicators)
  api_endpoint: wbgapi.data.DataFrame
  query_params:
    economy: CHN
    time: 2000-2023
    indicators:
    - NY.GDP.PCAP.CD
    - NY.GDP.PCAP.PP.CD
    - NY.GDP.MKTP.CD
    - NV.IND.TOTL.ZS
    - NV.SRV.TOTL.ZS
    - NV.AGR.TOTL.ZS
    - SL.AGR.EMPL.ZS
    - SL.IND.EMPL.ZS
    - SL.SRV.EMPL.ZS
    - SL.TLF.TOTL.IN
    - SL.UEM.TOTL.ZS
    - SP.URB.TOTL.IN.ZS
    - SP.POP.TOTL
    - SP.POP.65UP.TO.ZS
    - SP.POP.1564.TO.ZS
    - SE.XPD.TOTL.GD.ZS
    - SE.TER.ENRR
    - SE.SEC.ENRR
    - IT.NET.USER.ZS
    - IT.CEL.SETS.P2
    - IT.NET.BBND.P2
    - TX.VAL.TECH.MF.ZS
    - BX.KLT.DINV.CD.WD
    - NE.GDI.FTOT.ZS
    - FS.AST.PRVT.GD.ZS
    - GB.XPD.RSDV.GD.ZS
  fetch_date: 2026-03-29 14:06:04 UTC
  raw_file: data/raw/worldbank_china_indicators_20260329.csv
  processed_file: data/processed/worldbank_china_indicators.parquet
  sha256_raw: e2bf23c7544e7188d73490fbb6ab71093f5d909ca7322167b8a92d1a36949034
  sha256_processed: 47a056baad5a4c3f283ea7ba20e490b82d298a924156b79b34b2dfcd4b2649e6
  variables:
  - name: gdp_per_capita_usd
    description: GDP per capita (current US$)
    unit: current USD
    dag_variable: 'Controls: GDP per capita'
    wb_indicator: NY.GDP.PCAP.CD
  - name: gdp_per_capita_ppp
    description: GDP per capita, PPP (current international $)
    unit: current intl $
    dag_variable: 'Controls: GDP per capita (PPP)'
    wb_indicator: NY.GDP.PCAP.PP.CD
  - name: gdp_total_usd
    description: GDP (current US$)
    unit: current USD
    dag_variable: 'Controls: GDP total'
    wb_indicator: NY.GDP.MKTP.CD
  - name: industry_value_added_pct_gdp
    description: Industry (incl construction) value added (% of GDP)
    unit: '% of GDP'
    dag_variable: 'IND_UP: Industrial structure'
    wb_indicator: NV.IND.TOTL.ZS
  - name: services_value_added_pct_gdp
    description: Services value added (% of GDP)
    unit: '% of GDP'
    dag_variable: 'IND_UP: Tertiary sector share'
    wb_indicator: NV.SRV.TOTL.ZS
  - name: agriculture_value_added_pct_gdp
    description: Agriculture value added (% of GDP)
    unit: '% of GDP'
    dag_variable: 'Structural change: primary sector'
    wb_indicator: NV.AGR.TOTL.ZS
  - name: employment_agriculture_pct
    description: Employment in agriculture (% of total employment, modeled ILO)
    unit: '% of total employment'
    dag_variable: 'LS: Primary sector employment share'
    wb_indicator: SL.AGR.EMPL.ZS
  - name: employment_industry_pct
    description: Employment in industry (% of total employment, modeled ILO)
    unit: '% of total employment'
    dag_variable: 'LS: Secondary sector employment share'
    wb_indicator: SL.IND.EMPL.ZS
  - name: employment_services_pct
    description: Employment in services (% of total employment, modeled ILO)
    unit: '% of total employment'
    dag_variable: 'LS: Tertiary sector employment share'
    wb_indicator: SL.SRV.EMPL.ZS
  - name: labor_force_total
    description: Total labor force
    unit: persons
    dag_variable: 'Controls: Labor force size'
    wb_indicator: SL.TLF.TOTL.IN
  - name: unemployment_rate_pct
    description: Unemployment, total (% of total labor force, modeled ILO)
    unit: '%'
    dag_variable: 'Controls: Unemployment'
    wb_indicator: SL.UEM.TOTL.ZS
  - name: urban_population_pct
    description: Urban population (% of total population)
    unit: '%'
    dag_variable: 'Controls: Urbanization rate'
    wb_indicator: SP.URB.TOTL.IN.ZS
  - name: population_total
    description: Total population
    unit: persons
    dag_variable: 'Controls: Population'
    wb_indicator: SP.POP.TOTL
  - name: population_65plus_pct
    description: Population ages 65 and above (% of total)
    unit: '%'
    dag_variable: 'Confounder: Population aging'
    wb_indicator: SP.POP.65UP.TO.ZS
  - name: population_15_64_pct
    description: Population ages 15-64 (% of total)
    unit: '%'
    dag_variable: 'Confounder: Working age population'
    wb_indicator: SP.POP.1564.TO.ZS
  - name: tertiary_enrollment_gross
    description: School enrollment, tertiary (% gross)
    unit: '%'
    dag_variable: 'HC_INV: Higher education access'
    wb_indicator: SE.TER.ENRR
  - name: secondary_enrollment_gross
    description: School enrollment, secondary (% gross)
    unit: '%'
    dag_variable: 'HC_INV: Secondary education access'
    wb_indicator: SE.SEC.ENRR
  - name: internet_users_pct
    description: Individuals using the Internet (% of population)
    unit: '% of population'
    dag_variable: 'DE: Internet penetration'
    wb_indicator: IT.NET.USER.ZS
  - name: mobile_subscriptions_per100
    description: Mobile cellular subscriptions (per 100 people)
    unit: per 100 people
    dag_variable: 'DE: Mobile penetration'
    wb_indicator: IT.CEL.SETS.P2
  - name: fixed_broadband_per100
    description: Fixed broadband subscriptions (per 100 people)
    unit: per 100 people
    dag_variable: 'DE: Broadband penetration'
    wb_indicator: IT.NET.BBND.P2
  - name: fdi_net_inflows_usd
    description: Foreign direct investment, net inflows (BoP, current US$)
    unit: current USD
    dag_variable: 'Controls: FDI'
    wb_indicator: BX.KLT.DINV.CD.WD
  - name: gross_fixed_capital_formation_pct_gdp
    description: Gross fixed capital formation (% of GDP)
    unit: '% of GDP'
    dag_variable: 'Controls: Fixed asset investment proxy'
    wb_indicator: NE.GDI.FTOT.ZS
  - name: domestic_credit_private_pct_gdp
    description: Domestic credit to private sector (% of GDP)
    unit: '% of GDP'
    dag_variable: 'Controls: Financial development'
    wb_indicator: FS.AST.PRVT.GD.ZS
  - name: rd_expenditure_pct_gdp
    description: Research and development expenditure (% of GDP)
    unit: '% of GDP'
    dag_variable: 'DE: R&D intensity'
    wb_indicator: GB.XPD.RSDV.GD.ZS
  temporal_coverage:
    start: '2000'
    end: '2023'
    frequency: annual
  observations: 24
  missing_pct: !!python/object/apply:numpy._core.multiarray.scalar
  - &id001 !!python/object/apply:numpy.dtype
    args:
    - f8
    - false
    - true
    state: !!python/tuple
    - 3
    - <
    - null
    - null
    - null
    - -1
    - -1
    - 0
  - !!binary |
    MzMzMzMzA0A=
  license: Creative Commons Attribution 4.0 (CC-BY 4.0)
  notes: 'ILO-modeled employment estimates; some indicators have reporting lags. China
    country code: CHN.'
  status: acquired
