# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "china_double_reduction_education"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"
tectonic = ">=0.15"

# --- Core stack (always needed) ---
[pypi-dependencies]
numpy = ">=1.24"
scipy = ">=1.11"
pandas = ">=2.0"
matplotlib = ">=3.8"
statsmodels = ">=0.14"
rich = ">=13.0"
pyarrow = ">=14.0"
pyyaml = ">=6.0"

# --- Data acquisition ---
requests = ">=2.31"
wbgapi = ">=1.0"         # World Bank API
fredapi = ">=0.5"        # FRED API
openpyxl = ">=3.1"       # Excel reading

# --- Causal inference ---
dowhy = ">=0.11"
causal-learn = ">=0.1"   # PC algorithm for causal structure discovery
pdfplumber = ">=0.10"    # PDF table extraction

# --- Uncomment as needed ---
# scikit-learn = ">=1.3"
# xgboost = ">=2.0"

[tasks]
py = "python"
build-pdf = "cd phase6_documentation/exec && pandoc ANALYSIS_NOTE.md -o ANALYSIS_NOTE.pdf --pdf-engine=tectonic --number-sections --toc --filter pandoc-crossref --citeproc --bibliography=references.bib -V documentclass=article -V fontsize=11pt -V 'geometry:margin=1in' -V colorlinks=true -V linkcolor=NavyBlue -V urlcolor=NavyBlue"
acquire = "python phase0_discovery/scripts/acquire_data.py && python phase0_discovery/scripts/extract_ciefr_tables.py && python phase0_discovery/scripts/acquire_supplementary.py"
analyze-step1 = "python phase3_analysis/scripts/step1_prefilter.py"
analyze-step2 = "python phase3_analysis/scripts/step2_its_analysis.py"
analyze-step3 = "python phase3_analysis/scripts/step3_bsts_analysis.py"
analyze-step4 = "python phase3_analysis/scripts/step4_compositional.py"
analyze-step5 = "python phase3_analysis/scripts/step5_refutation.py"
analyze-step5b = "python phase3_analysis/scripts/step5b_ep_update.py"
analyze-step6 = "python phase3_analysis/scripts/step6_model_fitting.py"
analyze-step7 = "python phase3_analysis/scripts/step7_uncertainty.py"
analyze = "python phase3_analysis/scripts/step1_prefilter.py && python phase3_analysis/scripts/step2_its_analysis.py && python phase3_analysis/scripts/step3_bsts_analysis.py && python phase3_analysis/scripts/step4_compositional.py && python phase3_analysis/scripts/step5_refutation.py && python phase3_analysis/scripts/step5b_ep_update.py && python phase3_analysis/scripts/step6_model_fitting.py && python phase3_analysis/scripts/step7_uncertainty.py"
project = "python phase4_projection/scripts/projection_simulation.py"
