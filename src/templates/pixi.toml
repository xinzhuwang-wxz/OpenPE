# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "{name}"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"

# --- Core stack (always needed) ---
[pypi-dependencies]
numpy = ">=1.24"
scipy = ">=1.11"
pandas = ">=2.0"
matplotlib = ">=3.8"
statsmodels = ">=0.14"
rich = ">=13.0"
pyarrow = ">=14.0"
pyyaml = ">=6.0"

# --- Data acquisition ---
requests = ">=2.31"
wbgapi = ">=1.0"         # World Bank API
fredapi = ">=0.5"        # FRED API
openpyxl = ">=3.1"       # Excel reading

# --- Causal inference ---
dowhy = ">=0.11"
causal-learn = ">=0.1"   # PC algorithm for causal structure discovery

# --- Uncomment as needed ---
# scikit-learn = ">=1.3"
# xgboost = ">=2.0"

[tasks]
py = "python"
build-pdf = "cd phase6_documentation/exec && pandoc REPORT.md -o REPORT.pdf --pdf-engine=xelatex -V geometry:margin=1in -V documentclass:article -V fontsize:11pt --number-sections --toc --filter pandoc-crossref --citeproc -V header-includes='\\usepackage{graphicx}\\setkeys{Gin}{width=0.45\\linewidth,keepaspectratio}'"
# --- Analysis tasks: add as you write scripts ---
# Each script gets an independently runnable task.
# Example:
#   acquire = "python phase0_discovery/scripts/fetch_worldbank.py --indicator SP.POP.TOTL --country CHN"
#   analyze = "python phase3_analysis/scripts/causal_test.py"
#   project = "python phase4_projection/scripts/scenario_sim.py"
#   all = "python phase0_discovery/scripts/fetch_worldbank.py && python phase3_analysis/scripts/causal_test.py && python phase4_projection/scripts/scenario_sim.py"
