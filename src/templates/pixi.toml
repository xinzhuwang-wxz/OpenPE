# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "{name}"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"

# --- Core stack (always needed) ---
[pypi-dependencies]
numpy = ">=1.24"
scipy = ">=1.11"
pandas = ">=2.0"
matplotlib = ">=3.8"
statsmodels = ">=0.14"
rich = ">=13.0"
pyarrow = ">=14.0"
pyyaml = ">=6.0"

# --- Data acquisition ---
requests = ">=2.31"
wbgapi = ">=1.0"         # World Bank API
fredapi = ">=0.5"        # FRED API
openpyxl = ">=3.1"       # Excel reading

# --- Causal inference ---
dowhy = ">=0.11"
causal-learn = ">=0.1"   # PC algorithm for causal structure discovery
pdfplumber = ">=0.10"    # PDF table extraction

# --- Uncomment as needed ---
# scikit-learn = ">=1.3"
# xgboost = ">=2.0"

[tasks]
py = "python"
build-pdf = "cd phase6_documentation/exec && pandoc REPORT.md -o REPORT.pdf --pdf-engine=xelatex --defaults=../../scripts/openpe-metadata.yaml --number-sections --toc --filter pandoc-crossref --citeproc"
